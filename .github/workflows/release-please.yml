name: release-please

permissions: {}

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main

jobs:
  release-please:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  move-major-tag:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Move floating major tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          MAJOR: ${{ needs.release-please.outputs.major }}
        run: |
          sha=$(gh api "repos/${{ github.repository }}/git/ref/tags/${TAG_NAME}" --jq .object.sha)
          if gh api "repos/${{ github.repository }}/git/ref/tags/v${MAJOR}" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${{ github.repository }}/git/refs/tags/v${MAJOR}" -f sha="$sha" -F force=true
          else
            gh api -X POST "repos/${{ github.repository }}/git/refs" -f ref="refs/tags/v${MAJOR}" -f sha="$sha"
          fi

  enable-release-pr-automerge:
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge on release PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_JSON: ${{ needs.release-please.outputs.pr }}
        run: |
          pr_number=$(echo "$PR_JSON" | jq -r '.number')
          gh pr merge --auto --squash "$pr_number" --repo "${{ github.repository }}"
